<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest-admin.json">
    <meta name="theme-color" content="#1f2937">
    <link rel="apple-touch-icon" href="/static/images/icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Login</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800">

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl w-full max-w-sm">
        
        <!-- Header Section -->
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-900">Business Login</h2>
            <p class="text-sm text-slate-500 mt-2">Welcome back! Please enter your details.</p>
        </div>

        <!-- Error Message (Jinja2) -->
        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-500 p-3 mb-6 rounded-md">
            <p class="text-sm text-red-700 font-medium">{{ error }}</p>
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username" required
                    class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required
                    class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 mt-2">
                Sign In
            </button>
        </form>
        
    </div>
<script>
        // --- REGISTER PWA SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg))
                    .catch(err => console.error('Service Worker Failed:', err));
            });
        }
    </script>
</body>
</html>
